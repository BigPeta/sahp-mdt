<body>

<header>SAHP MDT SYSTEM</header>

<div class="container">

<div class="sidebar">

<input type="text" id="caseNumber" placeholder="Spisové číslo">

<input type="text" id="firstName" placeholder="Jméno">

<input type="text" id="lastName" placeholder="Příjmení">

<input type="text" id="phone" placeholder="Telefon">

<input type="text" id="license" placeholder="Licence">

<input type="text" id="vehicles" placeholder="Vozidla">

<input type="text" id="photo" placeholder="Odkaz na fotku">

<input type="text" id="evidence" placeholder="Evidenční čísla důkazů">

<textarea id="notes" placeholder="Poznámky"></textarea>

<input type="text" id="investigator" placeholder="Vyšetřovatel">
<button onclick="addPerson()">Uložit spis</button>
</div>

<div class="main">


<h2>MCD - Osoby v pátrání</h2>

<input type="text" id="search" placeholder="Hledat jméno, příjmení nebo ID..." onkeyup="render()">

<div id="list"></div>


</div>

</div>

<script>

let persons = JSON.parse(localStorage.getItem("persons")) || [];

function saveData(){
    localStorage.setItem("persons", JSON.stringify(persons));


let data = [];

async function loadData(){

    const res = await fetch("https://script.google.com/macros/s/AKfycby-FdLycjvcZgsI3bUqM_S2e9yFDTxJQFZRnXBtE8DYiiwYw306I7ifVb99ebsyboJTrw/exec");
    data = await res.json();

    render();
}

loadData();


}

async function addPerson(){

    const data = {
        caseNumber: document.getElementById("caseNumber").value,
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        phone: document.getElementById("phone").value,
        license: document.getElementById("license").value,
        vehicles: document.getElementById("vehicles").value,
        photo: document.getElementById("photo").value,
        evidence: document.getElementById("evidence").value,
        notes: document.getElementById("notes").value,
        investigator: document.getElementById("investigator").value
    };

    await fetch("https://script.google.com/macros/s/AKfycby-FdLycjvcZgsI3bUqM_S2e9yFDTxJQFZRnXBtE8DYiiwYw306I7ifVb99ebsyboJTrw/exec", {
        method: "POST",
        body: JSON.stringify(data)
    });

    alert("Spis uložen");

}

function deletePerson(id){
    persons = persons.filter(p => p.id !== id);
    saveData();
    renderPersons();
}

function render(){

    const search = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("list");

    list.innerHTML = "";

    const filtered = data.filter(p => 
        (p.jmeno && p.jmeno.toLowerCase().includes(search)) ||
        (p.prijmeni && p.prijmeni.toLowerCase().includes(search)) ||
        (p.id && p.id.toLowerCase().includes(search))
    );

    filtered.forEach(p => {

        const div = document.createElement("div");

        div.style.background = "#1e293b";
        div.style.padding = "10px";
        div.style.marginTop = "10px";
        div.style.borderRadius = "8px";

        div.innerHTML = `
            <b>${p.jmeno} ${p.prijmeni}</b><br>
            ID: ${p.id}<br>
            Status: ${p.status || "-"}<br>
            Stav: ${p.stav || "-"}
        `;

        list.appendChild(div);
    });
}


renderPersons();

</script>
