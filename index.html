<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SASP Terminal - MDT SECURE</title>
<style>
    body { margin:0; font-family:Arial, sans-serif; background:#0b1119; color:white; overflow: hidden; }
    
    /* --- LOGIN SCREEN --- */
    #loginScreen { display: flex; width: 100vw; height: 100vh; align-items: center; justify-content: center; background: #0b1119; }
    .login-box { display: flex; background: #111827; border: 1px solid #1e293b; border-radius: 8px; overflow: hidden; width: 750px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .login-left { width: 40%; background: #0d131c; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-right: 1px solid #1e293b; }
    .logo-circle { width: 80px; height: 80px; border: 2px solid #1d4ed8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #3b82f6; margin-bottom: 20px; box-shadow: 0 0 15px rgba(29, 78, 216, 0.3); }
    .login-left h2 { margin: 0; font-size: 22px; color: #f8fafc; }
    .login-left p { color: #64748b; font-size: 13px; margin: 10px 0 20px; line-height: 1.5; }
    .badge { border: 1px solid #1e3a8a; color: #60a5fa; padding: 4px 12px; font-size: 10px; font-weight: bold; letter-spacing: 2px; border-radius: 4px; background: rgba(30, 58, 138, 0.2); }
    
    .login-right { width: 60%; padding: 40px; display: flex; flex-direction: column; justify-content: center;}
    .login-right h3 { margin-top: 0; font-size: 11px; letter-spacing: 1.5px; color: #64748b; text-transform: uppercase; margin-bottom: 20px; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 12px; color: #64748b; margin-bottom: 6px; }
    .name-row { display: flex; gap: 10px; }
    .login-right input, .login-right select { width: 100%; padding: 12px; background: #0f1720; border: 1px solid #1e293b; color: white; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .login-right select { appearance: none; cursor: pointer; }
    .btn-login { background: #3b82f6; width: 100%; padding: 12px; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px;}
    .btn-login:hover { background: #2563eb; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 15px; font-size: 12px; color: #64748b; }
    .password-container { position: relative; display: flex; align-items: center; }
    .password-container input { padding-right: 40px; }
    .toggle-password { position: absolute; right: 10px; background: none; border: none; color: #94a3b8; font-size: 16px; cursor: pointer; padding: 0; outline: none;}
    .toggle-password:hover { color: #f8fafc; }

    /* --- HLAVIČKA APP --- */
    #mainApp { display: none; flex-direction: column; height: 100vh; }
    header { background:#111827; padding:10px 20px; font-weight:bold; border-bottom:2px solid #1e293b; display: flex; justify-content: space-between; align-items: center;}
    .header-left { display: flex; align-items: center; gap: 20px; }
    .app-title { font-size: 20px; margin-right: 15px;}
    
    .nav-tabs { display: flex; gap: 10px; }
    .nav-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
    .nav-btn:hover { background: #334155; color: white; }
    .nav-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; color: #94a3b8; }
    .btn-logout { background: transparent; border: 1px solid #dc2626; color: #ef4444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;}

    /* --- DATABÁZE --- */
    .container { display:flex; flex: 1; overflow: hidden;}
    .sidebar { width:340px; background:#111827; padding:20px; border-right:2px solid #1e293b; overflow-y:auto; display: flex; flex-direction: column; flex-shrink: 0;}
    .main { flex:1; padding:20px; overflow-y:auto; position: relative;}
    
    .sidebar input, .sidebar select, .sidebar textarea { width:100%; margin-top:8px; padding:10px; border:1px solid #334155; border-radius:6px; background:#1e293b; color:white; box-sizing:border-box; font-family: sans-serif;}
    .sidebar textarea { resize: vertical; min-height: 80px; }
    .sidebar button { background:#2563eb; width: 100%; padding: 12px; border:none; border-radius:6px; color:white; cursor:pointer; font-weight:bold; margin-top: 15px;}
    .btn-secondary { background: #475569 !important; margin-top: 5px !important; }
    
    /* Karty ve výpisu */
    .card { background:#1e293b; padding:15px; border-radius:8px; margin-top:15px; border-left: 4px solid #2563eb; word-wrap: break-word;}
    .card span.label { color: #94a3b8; font-size: 12px; font-weight: bold;}
    .card-actions { display: flex; justify-content: flex-end; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; flex-wrap: wrap; gap: 5px;}
    .category-badge { float: right; color: #60a5fa; border: 1px solid #60a5fa; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase;}
    .search-bar { font-size: 16px; border: 2px solid #2563eb; background: #0f1720; width: 100%; padding: 12px; color:white; border-radius: 6px; box-sizing: border-box;}
    #loader { display: none; color: #fbbf24; font-size: 14px; margin-top: 10px; font-weight: bold; text-align: center;}

    /* Speciální tlačítka */
    .btn-danger { background: #dc2626; padding: 6px 12px; font-size: 12px; color:white; border:none; border-radius:4px; cursor:pointer;}
    .btn-edit { background: #10b981; padding: 6px 12px; font-size: 12px; color:white; border:none; border-radius:4px; cursor:pointer;}
    .btn-folder { background: #f59e0b; padding: 6px 12px; font-size: 12px; color:black; font-weight:bold; border:none; border-radius:4px; cursor:pointer;}
    
    /* ŠTÍTKY (TAGY) */
    .tag { padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: 5px; margin-top: 5px; display: inline-block;}
    .tag-wanted { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; }
    .tag-informant { background: #064e3b; color: #6ee7b7; border: 1px solid #10b981; }
    .tag-case { background: #451a03; color: #fcd34d; border: 1px solid #f59e0b; }

    /* --- KARTA OSOBY (MODAL/POPUP) --- */
    #personModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: #0f1720; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 10px; border: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8);}
    .modal-header { background: #111827; padding: 15px 20px; border-bottom: 2px solid #1e293b; display: flex; justify-content: space-between; align-items: center;}
    .modal-header h2 { margin: 0; color: #60a5fa; font-size: 20px;}
    .close-modal { background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }
    .close-modal:hover { color: #ef4444; }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 20px;}
    .person-header { display: flex; gap: 20px; background: #1e293b; padding: 15px; border-radius: 8px; border-left: 4px solid #3b82f6;}
    .person-photo img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 2px solid #334155; }
    .person-info { flex: 1; }
    .person-info h3 { margin: 0 0 10px 0; font-size: 24px; color: white;}
    .person-info p { margin: 5px 0; color: #cbd5e1; font-size: 14px;}
    .history-section { background: #111827; padding: 15px; border-radius: 8px; border: 1px solid #1e293b; }
    .history-section h4 { margin-top: 0; color: #f8fafc; border-bottom: 1px solid #334155; padding-bottom: 8px;}
    .history-item { background: #1e293b; padding: 10px; margin-bottom: 10px; border-radius: 6px; font-size: 13px; border-left: 3px solid #64748b;}
    .history-item.zatykac { border-left-color: #ef4444; }
    .history-item.spis { border-left-color: #f59e0b; }

    /* --- OSTATNÍ ZÁLOŽKY --- */
    #mapSection { display: none; flex: 1; position: relative; background: #000; overflow: hidden; }
    #mapContainer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: grab; }
    #mapContainer:active { cursor: grabbing; }
    #mapImage { max-width: none; width: 100%; transition: transform 0.1s ease-out; transform-origin: top left; pointer-events: none;}
    .map-controls { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 10px; background: rgba(17, 24, 39, 0.8); padding: 10px; border-radius: 8px; z-index: 10;}
    .map-btn { background: #3b82f6; color: white; border: none; width: 40px; height: 40px; border-radius: 6px; font-size: 20px; font-weight: bold; cursor: pointer; }

    #templatesSection { display: none; flex: 1; overflow: hidden; }
    #pdfSection { display: none; flex: 1; overflow: hidden; }
    .pdf-btn { background: #1e293b; border: 1px solid #3b82f6; color: #cbd5e1; padding: 8px 12px; width: 100%; text-align: left; border-radius: 6px; cursor: pointer; margin-bottom: 5px; font-size: 12px; font-weight: bold;}
    .pdf-btn:hover { background: #3b82f6; color: white; }

    /* --- MOBILNÍ RESPONZIVITA --- */
    @media (max-width: 768px) {
        body { overflow-y: auto !important; }
        #mainApp { height: auto !important; } 
        .container { flex-direction: column; display: flex; height: auto !important; overflow: visible !important; }
        header { flex-direction: column; align-items: stretch; padding: 15px; }
        .header-left { flex-direction: column; align-items: stretch; gap: 15px; }
        .header-right { justify-content: space-between; margin-top: 15px; border-top: 1px solid #1e293b; padding-top: 15px; }
        .nav-tabs { flex-wrap: wrap; display: flex; gap: 5px; }
        .nav-btn { flex: 1 1 calc(50% - 5px); margin: 0; padding: 10px; font-size: 12px;}
        .sidebar { width: 100% !important; max-width: 100% !important; border-right: none; border-bottom: 2px solid #334155; padding: 15px; height: auto; overflow: visible;}
        .main { width: 100% !important; padding: 15px; overflow: visible;}
        .login-box { flex-direction: column; width: 90%; max-height: 95vh; overflow-y: auto; }
        .login-left, .login-right { width: 100%; }
        .person-header { flex-direction: column; align-items: center; text-align: center; }
    }
</style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <div class="login-left">
            <div class="logo-circle">🛡️</div>
            <h2>SASP Terminal</h2>
            <p>Secure Document Terminal<br>Master Name Index</p>
            <div class="badge">CLASSIFIED</div>
        </div>
        <div class="login-right">
            <h3>Přihlášení do systému</h3>
            <div class="input-group">
                <label>Hodnost</label>
                <select id="loginRank">
                    <option value="" disabled selected>— vyberte hodnost —</option>
                    <option value="Staff">Staff</option>
                    <option value="Lieutenant">Lieutenant</option>
                    <option value="Detective III">Detective III</option>
                    <option value="Detective II">Detective II</option>
                    <option value="Detective I">Detective I</option>
                    <option value="CSI">CSI</option>
                </select>
            </div>
            <div class="input-group">
                <label>Jméno a příjmení</label>
                <div class="name-row">
                    <input type="text" id="loginFName" placeholder="Jméno">
                    <input type="text" id="loginLName" placeholder="Příjmení">
                </div>
            </div>
            <div class="input-group">
                <label>Bezpečnostní kód (Heslo)</label>
                <div class="password-container">
                    <input type="password" id="loginPassword" placeholder="Zadejte tajný kód">
                    <button type="button" class="toggle-password" onclick="togglePassword()" title="Zobrazit heslo">👁️</button>
                </div>
            </div>
            <button class="btn-login" onclick="performLogin()">Ověřit u serveru a přihlásit</button>
            
            <div class="checkbox-row">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Zapamatovat přihlášení</label>
            </div>
            
        </div>
    </div>
</div>

<div id="mainApp">
    <header>
        <div class="header-left">
            <span class="app-title">SASP M.N.I.</span>
            <div class="nav-tabs">
                <button class="nav-btn active" id="tab-db" onclick="switchTab('db')">📁 Evidence</button>
                <button class="nav-btn" id="tab-map" onclick="switchTab('map')">🗺️ Mapa</button>
                <button class="nav-btn" id="tab-tpl" onclick="switchTab('tpl')">📝 Hlášení</button>
                <button class="nav-btn" id="tab-pdf" onclick="switchTab('pdf')">⚖️ Zákony</button>
            </div>
        </div>
        <div class="header-right">
            <span id="loggedInUser">Neznámý Uživatel</span>
            <button class="btn-logout" onclick="logout()">Odhlásit</button>
        </div>
    </header>

    <div id="databaseSection" class="container">
        <div class="sidebar">
            <select id="categorySelector" style="width: 100%; margin-bottom: 15px; padding: 10px; background: #0f1720; color:white; border:1px solid #3b82f6; border-radius:6px; font-weight: bold;" onchange="changeCategory()">
                <option value="Osoby">Osoby (Centrální evidence)</option>
                <option value="Zaznamy">Nová Událost / Záznam k osobě</option>
                <option value="Spisy">Velké Spisy (Cases)</option>
                <option value="Organizace">Organizované skupiny</option>
            </select>
            <h3 id="formTitle">Záznam</h3>
            <div id="dynamicForm"></div>
            <div id="loader">Komunikace s databází...</div>
            
            <button id="submitBtn" onclick="saveRecord()">Uložit do databáze</button>
            <button id="cancelEditBtn" class="btn-secondary" style="display:none;" onclick="cancelEdit()">Zrušit úpravu</button>
        </div>

        <div class="main">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="search" class="search-bar" style="margin-bottom: 0;" placeholder="Hledat jméno, SPZ, číslo spisu..." oninput="renderList()">
                <button onclick="loadData()" style="background: #334155; border: 1px solid #475569; border-radius: 6px; padding: 0 15px; color: white; cursor: pointer; font-weight: bold; transition: 0.2s;" onmouseover="this.style.background='#475569'" onmouseout="this.style.background='#334155'">⟳ Obnovit</button>
            </div>
            <div id="recordList"></div>
        </div>
    </div>

    <div id="personModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📁 Karta Osoby / Trestní rejstřík</h2>
                <button class="close-modal" onclick="closeModal()">✖</button>
            </div>
            <div class="modal-body" id="modalBodyContent">
                </div>
        </div>
    </div>

    <div id="mapSection">
        <div id="mapContainer">
            <img id="mapImage" src="https://i.imgur.com/k7xWOfA.png" alt="Mapa">
        </div>
        <div class="map-controls">
            <button class="map-btn" onclick="zoomMapBtn(0.2)">+</button>
            <button class="map-btn" onclick="zoomMapBtn(-0.2)">-</button>
            <button class="map-btn" style="font-size: 14px; width:auto; padding:0 10px;" onclick="resetMap()">Reset</button>
        </div>
    </div>
    
    <div id="templatesSection" class="container">
        <div class="sidebar">
            <h3 style="margin-bottom: 15px;">Dostupné předtisky</h3>
            <select id="templateSelector" style="width: 100%; padding: 10px; background: #0f1720; color:white; border:1px solid #3b82f6; border-radius:6px; font-weight: bold;"><option value="nesouhlas">Nesouhlas s trestem</option></select>
        </div>
        <div class="main"><div id="activeTemplateArea" class="template-builder">Místo pro generátor...</div></div>
    </div>

    <div id="pdfSection" class="container">
        <div class="sidebar">
            <h3 style="margin-bottom: 15px; color:#f8fafc;">Zákony</h3>
            <button class="pdf-btn" onclick="loadPdf('https://www.enjoyrp.cz/zakonnik/14-2001-Trestní%20zákoník%20a%20řád.pdf')">📄 Trestní zákoník a řád</button>
            </div>
        <div class="main" style="padding: 0;"><iframe id="pdfFrame" src="about:blank" width="100%" height="100%" style="border:none; border-radius: 8px; background: #1e293b;"></iframe></div>
    </div>

</div>
