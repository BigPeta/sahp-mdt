```html
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAHP MDT</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f1720;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    border-bottom:2px solid #1e293b;
}

.container{
    display:flex;
    height:calc(100vh - 80px);
}

.sidebar{
    width:300px;
    background:#111827;
    padding:20px;
    border-right:2px solid #1e293b;
    overflow:auto;
}

.main{
    flex:1;
    padding:20px;
    overflow:auto;
}

input, textarea, button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    box-sizing:border-box;
}

button{
    background:#2563eb;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}

.person{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

.crime{
    background:#0f1720;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
}

.search{
    margin-bottom:20px;
}

.small{
    font-size:13px;
    color:#94a3b8;
}

h2{
    margin-top:0;
}
</style>
</head>
<body>

<header>SAHP MDT SYSTEM</header>

<div class="container">

<div class="sidebar">

<h2>Přidat osobu</h2>

<input type="text" id="name" placeholder="Jméno">

<textarea id="note" placeholder="Poznámka"></textarea>

<textarea id="crimes" placeholder="Skutky (oddělit čárkou)"></textarea>

<button onclick="addPerson()">Uložit osobu</button>

<hr style="margin:25px 0; border-color:#334155;">

<h2>Vyhledávání</h2>

<input type="text" id="search" class="search" placeholder="Hledat osobu..." onkeyup="renderPersons()">

</div>

<div class="main">

<h2>Evidence osob</h2>

<div id="persons"></div>

</div>

</div>

<script>

let persons = JSON.parse(localStorage.getItem("persons")) || [];

function saveData(){
    localStorage.setItem("persons", JSON.stringify(persons));
}

function addPerson(){

    const name = document.getElementById("name").value;
    const note = document.getElementById("note").value;
    const crimes = document.getElementById("crimes").value
        .split(",")
        .map(c => c.trim())
        .filter(c => c !== "");

    if(!name) return alert("Zadej jméno");

    persons.push({
        id: Date.now(),
        name,
        note,
        crimes
    });

    saveData();
    renderPersons();

    document.getElementById("name").value = "";
    document.getElementById("note").value = "";
    document.getElementById("crimes").value = "";
}

function deletePerson(id){
    persons = persons.filter(p => p.id !== id);
    saveData();
    renderPersons();
}

function renderPersons(){

    const container = document.getElementById("persons");
    const search = document.getElementById("search").value.toLowerCase();

    container.innerHTML = "";

    persons
    .filter(p => p.name.toLowerCase().includes(search))
    .forEach(person => {

        const div = document.createElement("div");
        div.className = "person";

        div.innerHTML = `
            <h3>${person.name}</h3>

            <div class="small">
                ID: ${person.id}
            </div>

            <p>${person.note || "Bez poznámky"}</p>

            <strong>Trestní historie:</strong>

            ${person.crimes.length
                ? person.crimes.map(c =>
                    `<div class="crime">${c}</div>`
                  ).join("")
                : "<p>Bez záznamu</p>"
            }

            <button onclick="deletePerson(${person.id})"
            style="margin-top:15px; background:#dc2626;">
                Smazat
            </button>
        `;

        container.appendChild(div);

    });

}

renderPersons();

</script>

</body>
</html>
