<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAHP MDT</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f1720;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    border-bottom:2px solid #1e293b;
}

.container{
    display:flex;
    height:calc(100vh - 80px);
}

.sidebar{
    width:300px;
    background:#111827;
    padding:20px;
    border-right:2px solid #1e293b;
    overflow:auto;
}

.main{
    flex:1;
    padding:20px;
    overflow:auto;
}

input, textarea, button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    box-sizing:border-box;
}

button{
    background:#2563eb;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}

.person{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

.crime{
    background:#0f1720;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
}

.search{
    margin-bottom:20px;
}

.small{
    font-size:13px;
    color:#94a3b8;
}

h2{
    margin-top:0;
}
</style>
</head>
<body>

<header>SAHP MDT SYSTEM</header>

<div class="container">

<div class="sidebar">

<input type="text" id="caseNumber" placeholder="Spisové číslo">

<input type="text" id="firstName" placeholder="Jméno">

<input type="text" id="lastName" placeholder="Příjmení">

<input type="text" id="phone" placeholder="Telefon">

<input type="text" id="license" placeholder="Licence">

<input type="text" id="vehicles" placeholder="Vozidla">

<input type="text" id="photo" placeholder="Odkaz na fotku">

<input type="text" id="evidence" placeholder="Evidenční čísla důkazů">

<textarea id="notes" placeholder="Poznámky"></textarea>

<input type="text" id="investigator" placeholder="Vyšetřovatel">

</div>

<div class="main">

<h2>Evidence osob</h2>

<div id="persons"></div>

</div>

</div>

<script>

let persons = JSON.parse(localStorage.getItem("persons")) || [];

function saveData(){
    localStorage.setItem("persons", JSON.stringify(persons));
}

async function addPerson(){

    const data = {
        caseNumber: document.getElementById("caseNumber").value,
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        phone: document.getElementById("phone").value,
        license: document.getElementById("license").value,
        vehicles: document.getElementById("vehicles").value,
        photo: document.getElementById("photo").value,
        evidence: document.getElementById("evidence").value,
        notes: document.getElementById("notes").value,
        investigator: document.getElementById("investigator").value
    };

    await fetch("SEM_DEJ_SCRIPT_URL", {
        method: "POST",
        body: JSON.stringify(data)
    });

    alert("Spis uložen");

}

function deletePerson(id){
    persons = persons.filter(p => p.id !== id);
    saveData();
    renderPersons();
}

function renderPersons(){

    const container = document.getElementById("persons");
    const search = document.getElementById("search").value.toLowerCase();

    container.innerHTML = "";

    persons
    .filter(p => p.name.toLowerCase().includes(search))
    .forEach(person => {

        const div = document.createElement("div");
        div.className = "person";

        div.innerHTML = `
            <h3>${person.name}</h3>

            <div class="small">
                ID: ${person.id}
            </div>

            <p>${person.note || "Bez poznámky"}</p>

            <strong>Trestní historie:</strong>

            ${person.crimes.length
                ? person.crimes.map(c =>
                    `<div class="crime">${c}</div>`
                  ).join("")
                : "<p>Bez záznamu</p>"
            }

            <button onclick="deletePerson(${person.id})"
            style="margin-top:15px; background:#dc2626;">
                Smazat
            </button>
        `;

        container.appendChild(div);

    });

}

renderPersons();

</script>

</body>
</html>
